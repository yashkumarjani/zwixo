<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark premium background -->
  <rect width="1200" height="630" fill="#1C1C1E"/>
  
  <!-- Subtle glowing gold gradient circle in background for premium aesthetics -->
  <circle cx="600" cy="315" r="400" fill="url(#goldGlow)" opacity="0.15"/>
  
  <!-- Defs for gradients -->
  <defs>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#1C1C1E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Logo Group centered -->
  <g transform="translate(390, 130)">
    <!-- Z Icon (scaled up, size 150x150) -->
    <g transform="translate(135, 0)">
      <rect width="150" height="150" rx="36" fill="#1C1C1E" stroke="#F5A623" stroke-width="3"/>
      <rect x="28" y="32" width="94" height="20" rx="10" fill="#F5A623"/>
      <polygon points="102,52 122,52 48,100 28,100" fill="#F5A623"/>
      <rect x="28" y="100" width="94" height="20" rx="10" fill="#F5A623"/>
      <rect x="98" y="108" width="24" height="16" rx="4" fill="#1C1C1E"/>
      <polygon points="98,112 134,116 98,120" fill="#1C1C1E"/>
    </g>

    <!-- Wordmark ZWIXO (font-size 80, centered) -->
    <text x="210" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">
      ZWI<tspan fill="#F5A623">X</tspan>O
    </text>

    <!-- Tagline (font-size 16, centered) -->
    <text x="210" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="16" fill="#F5A623" text-anchor="middle" letter-spacing="4">
      SNAP IT · GLOW IT · DELIVER IT
    </text>

    <!-- Sub tagline (font-size 13, centered) -->
    <text x="210" y="305" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="13" fill="#8E8E93" text-anchor="middle" letter-spacing="2">
      INDIA'S MEMORY &amp; CELEBRATION STUDIO
    </text>
  </g>
</svg>
