<text x="340" y="548" font-family="'Plus Jakarta Sans', sans-serif" font-weight="400" font-size="11" fill="#8E8E93" text-anchor="middle" letter-spacing="1">✦  Z icon mein hidden chat bubble = WhatsApp-first brand  ✦</text>
<text x="340" y="566" font-family="'Plus Jakarta Sans', sans-serif" font-weight="400" font-size="11" fill="#8E8E93" text-anchor="middle" letter-spacing="1">✦  Saffron = India's most timeless celebration color  ✦</text>

