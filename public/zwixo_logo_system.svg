<polyline points="487,269 493,276 506,261" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<text x="496" y="302" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" fill="#8E8E93" text-anchor="middle" letter-spacing="1">Works in B&amp;W ✓</text>

