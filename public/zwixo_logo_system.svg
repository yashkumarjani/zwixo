</g>

<!-- Wordmark: baseline y=152, cap top ≈106, cap center=129 → matches icon center -->
<text x="244" y="152" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="64" fill="#1C1C1E" letter-spacing="-2">ZWIXO</text>

