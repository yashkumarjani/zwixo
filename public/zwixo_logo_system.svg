<text x="198" y="514" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" fill="#C7C7CC">Primary · Trust · Depth</text>

<rect x="362" y="490" width="22" height="22" rx="6" fill="#F5A623"/>
<text x="390" y="501" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" fill="#8E8E93">Saffron Gold  #F5A623</text>
<text x="390" y="514" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" fill="#C7C7CC">Accent · Indian · Celebration</text>

