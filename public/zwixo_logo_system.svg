<circle cx="414" cy="374" r="2.5" fill="#1C1C1E"/>
<text x="379" y="444" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="11" fill="#8E8E93" text-anchor="middle" letter-spacing="1">Monogram</text>

